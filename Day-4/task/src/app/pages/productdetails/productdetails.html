<div class="container py-5">
  <div class="row">
    <div class="col-md-6">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="#">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">Product Details</li>
        </ol>
        </nav>
        <h2 class="fw-bold">{{ productdetails.title }} </h2>
        <div class="d-flex align-items-center mb-3">
            <span class="badge bg-warning text-dark me-2">{{ productdetails.category }}</span>
            <span class="text-muted">({{ productdetails.rating.count }} reviews)</span>
        </div>
        <h3 class="text-primary fw-bold mb-4">${{ productdetails.price }}</h3>
        <p class="text-muted">({{ productdetails.description }})</p>

    </div>
    <div class="d-grid gap-2 col-md-6">
        <img src="{{ productdetails.image }}" class="img-fluid rounded" alt="{{ productdetails.title }}">
    </div>
  </div>
</div>
