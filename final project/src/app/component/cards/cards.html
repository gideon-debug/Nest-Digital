<div class="card" style="width: 18rem;">
  <img src="{{ product.background_image }}" class="card-img-top" alt="{{ product.name }}">
  <div class="card-body">
    <h5 class="card-title">{{ product.name }}</h5>
    <div class="mb-2 d-flex justify-content-between align-items-center">
      <span class="badge" [ngClass]="'bg-' + getRatingColor(product.rating)">
        ★ {{ product.rating }}/5
      </span>
      <span class="fw-bold text-success">${{ product.price }}</span>
    </div>
    <p class="card-text">
      <small class="text-muted">Platforms: {{ product.platforms?.length || 0 }}</small>
    </p>
    <a class="btn btn-primary" [routerLink]="['/productdetail', product.id]">
      View Details
    </a>
  </div>
</div>
