<div class="container text-center">
  <h1 class="mb-4">Gaming Store</h1>
  <div class="row">
    @for(item of data; track item.id){
      <div class="col-md-4 mb-4">
        <app-card [product]="item"></app-card>
      </div>
    }
    @empty {
      <div class="col">
        <p>No games available.</p>
      </div>
    }
  </div>
</div>
